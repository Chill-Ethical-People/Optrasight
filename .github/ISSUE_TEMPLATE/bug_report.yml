name: Bug report
description: Report a reproducible product or code issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OptraSight. Do not include credentials, client data, API keys, or private logs.
        If this is a security vulnerability, stop here and follow SECURITY.md instead of filing a public issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest sequence that reproduces the issue.
      placeholder: |
        1. Start the app with ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "main @ <commit sha>"
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, browser, deployment mode, and relevant environment variables.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I have not included secrets, client data, API keys, or private logs.
          required: true
